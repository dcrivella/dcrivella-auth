server:
  port: 9000
  servlet:
    session:
      cookie:
        name: AUTH_SESSION

spring:
  application:
    name: auth-server
    version: "@projectVersion@"

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_server
    username: auth_user
    password: auth_pass

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth

  flyway:
    enabled: true
    schemas: auth
    locations: classpath:db/migration

auth:
  token:
    # Per-client audience mapping (clientId -> audiences)
    client-audiences:
      # PKCE client used by client-server
      client-server-pkce: [ "api://resource-server" ]
      # Confidential client used by Postman
      client-postman-confidential: [ "api://resource-server" ]
      # PKCE client used by Postman
      client-server-postman-pkce: [ "api://resource-server" ]
      # Machine-to-machine client
      client-m2m: [ "api://resource-server" ]

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: TRACE
    org.springframework.security.oauth2: INFO
