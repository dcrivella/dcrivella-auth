apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: dcrivella-auth
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: "123456"
  AUTH_DB_USER: auth_user
  AUTH_DB_PASSWORD: auth_pass
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: dcrivella-auth
spec:
  type: NodePort
  selector:
    app: db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30543
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: dcrivella-auth
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: bootstrap
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "bootstrap"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "bootstrap"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: db
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
